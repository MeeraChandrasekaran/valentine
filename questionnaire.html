<!DOCTYPE html>
<html>
<head>
    <title>Doing Life Together ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #b30059;
        }

        h2 {
            color: #cc3366;
            margin-top: 40px;
        }

        form {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        label {
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            resize: vertical;
            min-height: 60px;
        }

        button {
            display: block;
            margin: 30px auto 0;
            padding: 12px 30px;
            font-size: 16px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e6004c;
        }

        .heart {
            position: fixed;
            color: #ff99aa;
            opacity: 0.3;
            font-size: 18px;
        }

        .top-nav {
            text-align: right;
            margin-bottom: 20px;
        }

        .top-nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #b30059;
            font-weight: 600;
        }

    </style>
</head>
<body>

<div class="top-nav">
    <a href="index.html">Home ❤️</a>
</div>

<h1>Doing Life Together</h1>

<form action="YOUR_FORMSPREE_LINK" method="POST">

<h2>Doing Life Together</h2>

<label>What’s something we do well as a team?</label>
<textarea name="team_strength"></textarea>

<label>What do you think we’ve handled well over the years?</label>
<textarea name="handled_well"></textarea>

<label>When do you feel most respected by me?</label>
<textarea name="respected"></textarea>

<label>What’s something about us that you’re proud of?</label>
<textarea name="proud_of_us"></textarea>

<h2>Do you notice me?</h2>
<h3>Pappu, you never tell me you love me or what I mean to you or things like that. I want you to do this for me and answer these questions from your heart. </h3>

<label>What’s something I don’t realize I do well?</label>
<textarea name="you_do_well"></textarea>

<label>What’s one habit of mine you secretly like?</label>
<textarea name="habit_you_like"></textarea>

<label>Do I add any value in your life or will you be the same without me?</label>
<textarea name="habit_you_like"></textarea>

<label>Tell me everything you feel about me. Write a lot.</label>
<textarea name="habit_you_like"></textarea>

<h2>Future Us</h2>

<label>What kind of couple do you want us to be as we get older?</label>
<textarea name="future_couple"></textarea>

<label>What’s one tradition we should start?</label>
<textarea name="new_tradition"></textarea>

<label>Where do you want us to travel together?</label>
<textarea name="travel"></textarea>

<label>What’s one small thing we could improve?</label>
<textarea name="improve"></textarea>

<h2>Light & Playful</h2>

<label>What’s our most underrated inside joke?</label>
<textarea name="inside_joke"></textarea>

<label>What’s something only we understand?</label>
<textarea name="only_us"></textarea>

<label>What’s one moment from this past year you liked?</label>
<textarea name="moment_liked"></textarea>

<button type="submit">Send It ❤️</button>

</form>

<script>
for (let i = 0; i < 30; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = Math.random() * window.innerHeight + "px";
    heart.style.fontSize = (12 + Math.random() * 18) + "px";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
